const Ring = ({pct,color,sz=64}) => {
  const r=26,circ=2*Math.PI*r,off=circ*(1-pct/100);
  return (
    <svg width={sz} height={sz} viewBox="0 0 64 64" style={{transform:"rotate(-90deg)"}}>
      <circle cx="32" cy="32" r={r} fill="none" stroke="var(--border2)" strokeWidth="5"/>
      <circle cx="32" cy="32" r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .6s ease"}}/>
    </svg>
  );
};

  const [loading,setLoading] = useState(false);
  const [showPw,setShowPw] = useState(false); // not used but pattern ready

    const e={};
    if(!f.name.trim()) e.name="Tu nombre es requerido";
    if(!f.email.includes("@")||!f.email.includes(".")) e.email="Ingresa un email válido";
    if(!/^\d{7,12}$/.test(f.phone)) e.phone="Solo dígitos, entre 7 y 12";
    return e;
  };

  const submit = async () => {
    const e=validate();
    if(Object.keys(e).length){setErr(e);return;}
    setLoading(true);
    try {
      const id = uid();
      const data = { name:f.name.trim(), email:f.email.trim().toLowerCase(), phone:`${f.cc}${f.phone}`, uid:id };
      if(fb()) await fb().saveUser(id, data);
      localStorage.setItem("dmkit_user", JSON.stringify(data));
      setTimeout(()=>onDone(data), 600);
    } catch(ex) {
      console.warn("Firebase save failed, continuing offline:", ex);
      const data = { name:f.name.trim(), email:f.email.trim().toLowerCase(), phone:`${f.cc}${f.phone}`, uid:uid() };
      localStorage.setItem("dmkit_user", JSON.stringify(data));
      onDone(data);
    }
  };

  const setField = (key,val) => { setF({...f,[key]:val}); setErr({...err,[key]:""}); };

  return (

// ─── DIAGNOSTIC ───────────────────────────────────────────────────────────────
const Diagnostic = ({onResult}) => {
  const [step,setStep] = useState(0);
  const [scores,setScores] = useState({deudas:0,ventas:0,mentalidad:0});
  const [sel,setSel] = useState(null);

  const pick = (type) => {
    const ns={...scores,[type]:scores[type]+1};
    setSel(type);
    setTimeout(()=>{
      setSel(null);
      if(step < DIAG.length-1){ setStep(step+1); setScores(ns); }
      else { onResult(Object.entries(ns).sort((a,b)=>b[1]-a[1])[0][0]); }
    },380);
  };
  const q=DIAG[step];
  return (
    <div className="fade" style={{minHeight:"100vh",padding:"32px 20px",background:"linear-gradient(160deg,var(--bg),var(--bg2))"}}>
      <p className="label-xs" style={{color:"var(--dim)",marginBottom:14}}>Diagnóstico · {step+1} de {DIAG.length}</p>
      <div style={{height:3,background:"var(--border)",borderRadius:2,marginBottom:32,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${((step+1)/DIAG.length)*100}%`,background:"linear-gradient(90deg,var(--gold),var(--gold-light))",borderRadius:2,transition:"width .5s ease"}}/>
      </div>
      <h2 style={{fontSize:22,fontWeight:700,letterSpacing:"-0.02em",lineHeight:1.3,marginBottom:28,color:"var(--text)"}}>{q.q}</h2>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {q.opts.map(o=>(
          <button key={o.type} onClick={()=>pick(o.type)}
            style={{textAlign:"left",padding:"16px",borderRadius:16,display:"flex",alignItems:"flex-start",gap:14,background:sel===o.type?"rgba(201,168,76,.1)":"var(--surface)",border:`1.5px solid ${sel===o.type?"var(--gold-bdr)":"var(--border)"}`,transition:"all .2s"}}>
            <span style={{fontSize:24,flexShrink:0,marginTop:1}}>{o.icon}</span>
            <span style={{fontSize:14,lineHeight:1.55,color:sel===o.type?"var(--gold-light)":"var(--text)"}}>{o.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

// ─── MODULE ───────────────────────────────────────────────────────────────────
const Module = ({moduleId,user,onBack,tasks,onToggle}) => {
  const [week,setWeek] = useState(0);
  const m=MODS[moduleId], wk=m.weeks[week];
  const wt=tasks[`${moduleId}_w${week}`]||{};
  const done=Object.values(wt).filter(Boolean).length;
  const total=wk.tasks.length;
  const wpct=Math.round((done/total)*100);
  const allDone=m.weeks.map((_,i)=>{const t=tasks[`${moduleId}_w${i}`]||{};return Object.values(t).filter(Boolean).length===m.weeks[i].tasks.length;});
  const totDone=allDone.filter(Boolean).length;
  const totPct=Math.round((totDone/m.weeks.length)*100);
  const showBigCTA = week===3 && wpct>=50;
  const showNudge = week>=2 && !showBigCTA;

  return (
    <div className="fade">
      {/* Header */}
      <div style={{padding:"24px 20px 16px"}}>

            <p style={{fontSize:12,color:"var(--dim)"}}>{m.subtitle}</p>
          </div>
          <div className="ring-wrap">
            <Ring pct={totPct} color={m.color} sz={64}/>
            <div className="ring-label">
              <span style={{fontSize:13,fontWeight:700,color:m.color}}>{totPct}%</span>
            </div>
          </div>
        </div>
      </div>

      {/* Week pills */}
      <div className="no-scroll" style={{display:"flex",gap:8,padding:"0 20px 16px",overflowX:"auto"}}>

            style={week===i?{background:m.color}:{}}>

      {/* Week card */}

          </div>
          <span style={{fontSize:12,fontWeight:700,color:m.color,marginLeft:12,flexShrink:0,marginTop:2}}>{done}/{total}</span>
        </div>
        <div style={{height:3,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${wpct}%`,background:m.color,borderRadius:2,transition:"width .5s ease"}}/>

      <div className="insight-box" style={{margin:"0 20px 14px",borderLeft:`3px solid ${m.color}`}}>

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [phase,setPhase]   = useState("loading");
  const [user,setUser]     = useState(null);
  const [diagnosed,setDx]  = useState(null);
  const [tab,setTab]       = useState("home");
  const [mod,setMod]       = useState(null);
  const [tasks,setTasks]   = useState({});

  // Boot — check localStorage
  useEffect(()=>{
    try {
      const u = JSON.parse(localStorage.getItem("dmkit_user")||"null");
      const d = localStorage.getItem("dmkit_dx")||null;
      const t = JSON.parse(localStorage.getItem("dmkit_tasks")||"{}");
      if(u){ setUser(u); setDx(d); setTasks(t); setPhase("main"); }
      else { setPhase("intro"); }
    } catch(e){ setPhase("intro"); }
  },[]);

  const persist = (u,d,t) => {
    try {
      if(u) localStorage.setItem("dmkit_user", JSON.stringify(u));
      if(d) localStorage.setItem("dmkit_dx", d);
      localStorage.setItem("dmkit_tasks", JSON.stringify(t));
    } catch(e){}
  };

  const saveTasks = async (upd) => {
    setTasks(upd);
    persist(user, diagnosed, upd);
    if(fb() && user?.uid){
      try { await fb().saveProgress(user.uid, { tasks: upd, diagnosed }); } catch(e){}
    }
  };

  const handleToggle = (mId,wi,ti) => {
    const k=`${mId}_w${wi}`;
    const upd={...tasks,[k]:{...(tasks[k]||{}),[ti]:!(tasks[k]||{})[ti]}};
    saveTasks(upd);
  };

  const handleNav = (t) => {
    setTab(t);
    if(t==="diag"){ setMod(null); setPhase("diagnostic"); return; }
    if(["deudas","ventas","mentalidad"].includes(t)) setMod(t);
    else setMod(null);
  };

  const handleDiagResult = async (r) => {
    setDx(r);
    localStorage.setItem("dmkit_dx", r);
    if(fb() && user?.uid){
      try { await fb().saveProgress(user.uid, { diagnosed: r }); } catch(e){}
    }
    setPhase("result");
  };

  const bg = {background:"linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%)",minHeight:"100vh"};
  const showMod = mod && ["deudas","ventas","mentalidad"].includes(mod);

  if(phase==="loading") return <div style={{...bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:32}}>⏳</div></div>;
  if(phase==="intro")   return <div style={bg}><Onboarding onDone={()=>setPhase("register")}/></div>;
  if(phase==="register") return <div style={bg}><Register onDone={u=>{setUser(u);setPhase("diagnostic");}}/></div>;
  if(phase==="diagnostic") return <div style={bg}><Diagnostic onResult={handleDiagResult}/></div>;
  if(phase==="result")  return <div style={bg}><Result result={diagnosed} user={user} onGo={v=>{if(v==="home"){setTab("home");setMod(null);}else{setMod(v);setTab(v);}setPhase("main");}}/></div>;

  return (
    <div style={bg}>
      <div style={{maxWidth:480,margin:"0 auto",paddingBottom:72}}>
        {!showMod
          ? <Home user={user} diagnosed={diagnosed} onModule={id=>{setMod(id);setTab(id);}} onDiag={()=>setPhase("diagnostic")}/>
          : <Module moduleId={mod} user={user} onBack={()=>{setMod(null);setTab("home");}} tasks={tasks} onToggle={handleToggle}/>
        }
      </div>
      <Nav active={tab} onNav={handleNav}/>
      <WAFloat/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
